name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Write .env from secrets
        env:
          SERAPEUM_API_URL: ${{ secrets.SERAPEUM_API_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          printf "SERAPEUM_API_URL=%s\nSUPABASE_URL=%s\nSUPABASE_ANON_KEY=%s\nSENTRY_DSN=%s\n" \
            "$SERAPEUM_API_URL" "$SUPABASE_URL" "$SUPABASE_ANON_KEY" "$SENTRY_DSN" > .env
          cp .env .env.remote

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter
        with:
          skip-dummy-env: "true"

      - name: Build APK
        run: flutter build apk --release --dart-define-from-file=.env.remote

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 1

  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Write .env from secrets
        env:
          SERAPEUM_API_URL: ${{ secrets.SERAPEUM_API_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          printf "SERAPEUM_API_URL=%s\nSUPABASE_URL=%s\nSUPABASE_ANON_KEY=%s\nSENTRY_DSN=%s\n" \
            "$SERAPEUM_API_URL" "$SUPABASE_URL" "$SUPABASE_ANON_KEY" "$SENTRY_DSN" > .env
          cp .env .env.remote

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter
        with:
          skip-dummy-env: "true"

      - name: Build macOS app
        run: flutter build macos --release --dart-define-from-file=.env.remote

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          create-dmg \
            --volname "Serapeum" \
            --window-size 600 400 \
            --icon-size 128 \
            --app-drop-link 450 185 \
            "Serapeum-${VERSION}.dmg" \
            "build/macos/Build/Products/Release/Serapeum.app"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: "Serapeum-*.dmg"
          retention-days: 1

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android, build-macos]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            --generate-notes \
            --title "Serapeum App v${VERSION}" \
            "dist/android-apk/app-release.apk#Serapeum-${VERSION}.apk" \
            "dist/macos-dmg/Serapeum-${VERSION}.dmg"
