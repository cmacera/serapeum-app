name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Write .env files
        uses: ./.github/actions/write-env
        with:
          serapeum-api-url: ${{ secrets.SERAPEUM_API_URL }}
          supabase-url: ${{ secrets.SUPABASE_URL }}
          supabase-anon-key: ${{ secrets.SUPABASE_ANON_KEY }}
          sentry-dsn: ${{ secrets.SENTRY_DSN }}

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter
        with:
          skip-dummy-env: "true"

      - name: Build APK
        run: flutter build apk --release --dart-define-from-file=.env.remote

      - name: Upload APK artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 1

  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Write .env files
        uses: ./.github/actions/write-env
        with:
          serapeum-api-url: ${{ secrets.SERAPEUM_API_URL }}
          supabase-url: ${{ secrets.SUPABASE_URL }}
          supabase-anon-key: ${{ secrets.SUPABASE_ANON_KEY }}
          sentry-dsn: ${{ secrets.SENTRY_DSN }}

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter
        with:
          skip-dummy-env: "true"

      - name: Build macOS app
        run: flutter build macos --release --dart-define-from-file=.env.remote

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          create-dmg \
            --volname "Serapeum" \
            --window-size 600 400 \
            --icon-size 128 \
            --app-drop-link 450 185 \
            "Serapeum-${VERSION}.dmg" \
            "build/macos/Build/Products/Release/Serapeum.app"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: macos-dmg
          path: "Serapeum-*.dmg"
          retention-days: 1

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build-android, build-macos]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download APK artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: android-apk
          path: dist/android-apk/

      - name: Download DMG artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: macos-dmg
          path: dist/macos-dmg/

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APK="dist/android-apk/app-release.apk"
          DMG="dist/macos-dmg/Serapeum-${VERSION}.dmg"

          if gh release view "$GITHUB_REF_NAME" &>/dev/null; then
            gh release upload "$GITHUB_REF_NAME" --clobber \
              "${APK}#Serapeum-${VERSION}.apk" \
              "${DMG}"
          else
            gh release create "$GITHUB_REF_NAME" \
              --generate-notes \
              --title "Serapeum App v${VERSION}" \
              "${APK}#Serapeum-${VERSION}.apk" \
              "${DMG}"
          fi
