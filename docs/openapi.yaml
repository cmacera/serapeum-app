openapi: 3.1.0
info:
  title: Serapeum API
  version: 1.0.0
  description: AI-powered media discovery API. Search for books, movies, TV shows,
    and video games, or use the orchestrator for natural language queries.
servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://api.serapeum.app
    description: Production
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Book:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        authors:
          type: array
          items:
            type: string
        publisher:
          type: string
        publishedDate:
          type: string
        description:
          type: string
        isbn:
          type: string
        pageCount:
          type: number
        categories:
          type: array
          items:
            type: string
        imageLinks:
          type: object
          properties:
            thumbnail:
              type: string
            smallThumbnail:
              type: string
        language:
          type: string
        previewLink:
          type: string
        averageRating:
          type: number
        printType:
          type: string
        maturityRating:
          type: string
      required:
        - id
        - title
    Media:
      type: object
      properties:
        id:
          type: number
        title:
          type: string
        name:
          type: string
        media_type:
          type: string
          enum:
            - movie
            - tv
        release_date:
          type: string
        poster_path:
          type:
            - string
            - "null"
        overview:
          type: string
        vote_average:
          type: number
        popularity:
          type: number
        backdrop_path:
          type:
            - string
            - "null"
        genre_ids:
          type: array
          items:
            type: number
        genres:
          type: array
          items:
            type: string
        original_language:
          type: string
      required:
        - id
        - media_type
    Game:
      type: object
      properties:
        id:
          type: number
        name:
          type: string
        summary:
          type: string
        rating:
          type: number
        aggregated_rating:
          type: number
        released:
          type: string
        cover_url:
          type: string
        platforms:
          type: array
          items:
            type: string
        genres:
          type: array
          items:
            type: string
        developers:
          type: array
          items:
            type: string
        publishers:
          type: array
          items:
            type: string
        game_type:
          type: number
        screenshots:
          type: array
          items:
            type: string
        videos:
          type: array
          items:
            type: string
        themes:
          type: array
          items:
            type: string
        game_modes:
          type: array
          items:
            type: string
        age_ratings:
          type: array
          items:
            type: object
            properties:
              organization:
                type: string
              rating:
                type: string
            required:
              - organization
              - rating
        similar_games:
          type: array
          items:
            type: object
            properties:
              id:
                type: number
              name:
                type: string
            required:
              - id
              - name
      required:
        - id
        - name
    SearchError:
      type: object
      properties:
        source:
          type: string
          enum:
            - media
            - books
            - games
        message:
          type: string
      required:
        - source
        - message
    SearchAllResponse:
      type: object
      properties:
        media:
          type: array
          items:
            $ref: "#/components/schemas/Media"
        books:
          type: array
          items:
            $ref: "#/components/schemas/Book"
        games:
          type: array
          items:
            $ref: "#/components/schemas/Game"
        errors:
          type: array
          items:
            $ref: "#/components/schemas/SearchError"
      required:
        - media
        - books
        - games
    BooksResponse:
      type: array
      items:
        $ref: "#/components/schemas/Book"
    MediaResponse:
      type: array
      items:
        $ref: "#/components/schemas/Media"
    GamesResponse:
      type: array
      items:
        $ref: "#/components/schemas/Game"
    GeneralDiscoveryResponse:
      type: object
      properties:
        text:
          type: string
          description: AI-generated summary text
        data:
          $ref: "#/components/schemas/SearchAllResponse"
      required:
        - text
        - data
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        details:
          type: string
      required:
        - error
    OrchestratorResponse:
      anyOf:
        - type: string
          description: Plain text response (out-of-scope or fallback)
        - $ref: "#/components/schemas/GeneralDiscoveryResponse"
        - $ref: "#/components/schemas/BooksResponse"
        - $ref: "#/components/schemas/MediaResponse"
        - $ref: "#/components/schemas/GamesResponse"
        - $ref: "#/components/schemas/ErrorResponse"
    CatalogSearchInput:
      type: object
      properties:
        query:
          type: string
          minLength: 1
          description: Search query string
          example: Dune
        language:
          type: string
          description: BCP-47 language tag (e.g. en, es-ES)
          example: en
      required:
        - query
    CastMember:
      type: object
      properties:
        id:
          type: number
        name:
          type: string
        character:
          type: string
        profile_path:
          type:
            - string
            - "null"
      required:
        - id
        - name
        - character
    Video:
      type: object
      properties:
        id:
          type: string
        key:
          type: string
        name:
          type: string
        site:
          type: string
          enum:
            - YouTube
        type:
          type: string
        official:
          type: boolean
        published_at:
          type: string
      required:
        - id
        - key
        - name
        - site
        - type
        - official
        - published_at
    WatchProvider:
      type: object
      properties:
        logo_path:
          type: string
        provider_id:
          type: number
        provider_name:
          type: string
        display_priority:
          type: number
      required:
        - logo_path
        - provider_id
        - provider_name
        - display_priority
    WatchProviderRegion:
      type: object
      properties:
        link:
          type: string
        flatrate:
          type: array
          items:
            $ref: "#/components/schemas/WatchProvider"
        rent:
          type: array
          items:
            $ref: "#/components/schemas/WatchProvider"
        buy:
          type: array
          items:
            $ref: "#/components/schemas/WatchProvider"
      required:
        - link
    SeasonSummary:
      type: object
      properties:
        season_number:
          type: number
        name:
          type: string
        episode_count:
          type: number
        air_date:
          type:
            - string
            - "null"
        poster_path:
          type:
            - string
            - "null"
      required:
        - season_number
        - name
        - episode_count
    MovieDetail:
      type: object
      properties:
        id:
          type: number
        media_type:
          type: string
          enum:
            - movie
        title:
          type: string
        original_title:
          type: string
        overview:
          type:
            - string
            - "null"
        tagline:
          type:
            - string
            - "null"
        release_date:
          type:
            - string
            - "null"
        status:
          type: string
        runtime:
          type:
            - number
            - "null"
        budget:
          type: number
        revenue:
          type: number
        vote_average:
          type: number
        vote_count:
          type: number
        popularity:
          type: number
        poster_path:
          type:
            - string
            - "null"
        backdrop_path:
          type:
            - string
            - "null"
        genres:
          type: array
          items:
            type: string
        original_language:
          type: string
        cast:
          type: array
          items:
            $ref: "#/components/schemas/CastMember"
          maxItems: 10
        trailers:
          type: array
          items:
            $ref: "#/components/schemas/Video"
        watch_providers:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/WatchProviderRegion"
        certification:
          type:
            - string
            - "null"
      required:
        - id
        - media_type
        - title
    TvDetail:
      type: object
      properties:
        id:
          type: number
        media_type:
          type: string
          enum:
            - tv
        name:
          type: string
        original_name:
          type: string
        overview:
          type:
            - string
            - "null"
        tagline:
          type:
            - string
            - "null"
        first_air_date:
          type:
            - string
            - "null"
        last_air_date:
          type:
            - string
            - "null"
        status:
          type: string
        seasons_count:
          type: number
        episodes_count:
          type: number
        episode_run_time:
          type: array
          items:
            type: number
        vote_average:
          type: number
        vote_count:
          type: number
        popularity:
          type: number
        poster_path:
          type:
            - string
            - "null"
        backdrop_path:
          type:
            - string
            - "null"
        genres:
          type: array
          items:
            type: string
        original_language:
          type: string
        seasons:
          type: array
          items:
            type: object
            properties:
              season_number:
                type: number
              name:
                type: string
              episode_count:
                type: number
              air_date:
                type:
                  - string
                  - "null"
              poster_path:
                type:
                  - string
                  - "null"
            required:
              - season_number
              - name
              - episode_count
        networks:
          type: array
          items:
            type: object
            properties:
              id:
                type: number
              name:
                type: string
              logo_path:
                type:
                  - string
                  - "null"
              origin_country:
                type: string
            required:
              - id
              - name
        creators:
          type: array
          items:
            type: object
            properties:
              id:
                type: number
              name:
                type: string
              profile_path:
                type:
                  - string
                  - "null"
            required:
              - id
              - name
        cast:
          type: array
          items:
            $ref: "#/components/schemas/CastMember"
          maxItems: 10
        trailers:
          type: array
          items:
            $ref: "#/components/schemas/Video"
        watch_providers:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/WatchProviderRegion"
        certification:
          type:
            - string
            - "null"
      required:
        - id
        - media_type
        - name
    MediaDetailInput:
      type: object
      properties:
        id:
          type: integer
          exclusiveMinimum: 0
          description: TMDB movie or TV show ID
          example: 550
        language:
          type: string
          description: BCP-47 language tag (e.g. en, es-ES)
          example: en
        region:
          type: string
          description: ISO 3166-1 country code to filter watch providers (e.g. US, ES,
            MX). Defaults to US if not provided.
          example: ES
      required:
        - id
  parameters: {}
paths:
  /searchBooks:
    post:
      summary: Search for books
      description: Searches the Google Books API and returns a list of matching books.
      tags:
        - Catalog
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CatalogSearchInput"
      responses:
        "200":
          description: List of matching books
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BooksResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized — missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /searchMedia:
    post:
      summary: Search for movies and TV shows
      description: Searches the TMDB API and returns a list of matching movies and TV shows.
      tags:
        - Catalog
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CatalogSearchInput"
      responses:
        "200":
          description: List of matching movies and TV shows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized — missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /searchGames:
    post:
      summary: Search for video games
      description: Searches the IGDB API and returns a list of matching video games.
      tags:
        - Catalog
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CatalogSearchInput"
      responses:
        "200":
          description: List of matching video games
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GamesResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized — missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /searchAll:
    post:
      summary: Search across all media types
      description: Searches books, movies/TV shows, and games in parallel and returns
        aggregated results.
      tags:
        - Catalog
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CatalogSearchInput"
      responses:
        "200":
          description: Aggregated results from all media sources
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchAllResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized — missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /orchestratorFlow:
    post:
      summary: AI orchestrator
      description: Routes a natural language query through the AI orchestrator.
        Returns structured catalog data, a synthesized text+data response, or a
        plain text reply depending on the query intent.
      tags:
        - Agent
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: string
              minLength: 1
              description: Natural language query for the AI orchestrator
              example: Best sci-fi movies of 2024
      responses:
        "200":
          description: Orchestrator response (varies by query intent)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrchestratorResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized — missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /getMovieDetail:
    post:
      summary: Get movie details
      description: "Returns full details for a movie: cast, trailers, watch providers,
        and extended metadata."
      tags:
        - Catalog
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MediaDetailInput"
      responses:
        "200":
          description: Full movie detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovieDetail"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized — missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Movie not found in TMDB
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many requests — TMDB rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /getTvDetail:
    post:
      summary: Get TV show details
      description: "Returns full details for a TV show: cast, trailers, seasons, watch
        providers, and extended metadata."
      tags:
        - Catalog
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MediaDetailInput"
      responses:
        "200":
          description: Full TV show detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TvDetail"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized — missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: TV show not found in TMDB
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many requests — TMDB rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
webhooks: {}
